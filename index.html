<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Ruler</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: -apple-system, system-ui, sans-serif;
      touch-action: none;
    }

    canvas {
      position: absolute; top: 0; left: 0;
      width: 100% !important; height: 100% !important; z-index: 1;
    }

    /* Fullscreen tap zone — above canvas, below UI.
       Catches touchend because dom-overlay swallows XR select events. */
    #tap-layer {
      position: absolute; inset: 0; z-index: 5;
      background: transparent; display: none; touch-action: none;
    }

    /* ── Top info card ── */
    #overlay {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      width: 88%; max-width: 360px;
      background: rgba(0,0,0,0.82); color: #fff;
      padding: 16px 16px 12px; border-radius: 22px; text-align: center;
      z-index: 10; backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); display: none;
    }
    #status {
      font-size: 11px; color: #aaa;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
    }
    #measure-text { font-size: 38px; font-weight: 800; color: #007AFF; margin: 2px 0 10px; }

    .row { display: flex; gap: 8px; margin-top: 8px; }
    button {
      flex: 1; padding: 11px 4px; border: none; border-radius: 12px;
      font-weight: 600; font-size: 12px; color: #fff;
      background: #2a2a2a; cursor: pointer;
    }
    button:active { opacity: 0.7; }
    button.blue   { background: #007AFF; }
    button.red    { background: #ff3b30; }
    button.orange { background: #ff9500; }
    button.green  { background: #34c759; }

    #adj-row     { display: none; }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: absolute; bottom: 44px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 16px; align-items: center; z-index: 20;
    }
    #ar-btn {
      padding: 18px 40px; background: #007AFF; color: #fff; border: none;
      border-radius: 35px; font-size: 17px; font-weight: 700;
      box-shadow: 0 10px 25px rgba(0,122,255,0.4); cursor: pointer;
    }
    #snap-btn {
      width: 64px; height: 64px; border-radius: 50%;
      background: #fff; border: 5px solid rgba(255,255,255,0.5);
      font-size: 26px; display: none; align-items: center;
      justify-content: center; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35); flex-shrink: 0;
    }
    #snap-btn:active { transform: scale(0.9); }

    /* Toast */
    #toast {
      position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
      background: rgba(255,59,48,0.92); color: #fff; padding: 12px 20px;
      border-radius: 12px; font-size: 13px; z-index: 30;
      display: none; max-width: 300px; text-align: center;
    }

    /* Shutter flash */
    #flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 999;
    }
  </style>
</head>
<body>

  <div id="tap-layer"></div>

  <div id="overlay">
    <div id="status">Scanning…</div>
    <div id="measure-text">—</div>

    <div class="row">
      <button id="u-m"  class="blue" onclick="setUnit('m')">METERS</button>
      <button id="u-cm"              onclick="setUnit('cm')">CM</button>
      <button class="red"            onclick="resetAll()">RESET</button>
    </div>

    <div class="row" id="adj-row">
      <button id="adj-p1" class="orange" onclick="startAdjust(0)">Adjust P1</button>
      <button id="adj-p2" class="orange" onclick="startAdjust(1)">Adjust P2</button>
      <button class="green"  id="adj-confirm" style="display:none" onclick="confirmAdjust()">✓ Confirm</button>
    </div>
  </div>

  <div id="bottom-bar">
    <button id="ar-btn">Start Measuring</button>
    <button id="snap-btn" onclick="takeSnapshot()">📸</button>
  </div>

  <div id="toast"></div>
  <div id="flash"></div>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let renderer, scene, camera, reticle;
let xrSession      = null;
let xrRefSpace     = null;
let hitTestSource  = null;
let hitTestReady   = false;

let points       = [];   // THREE.Group[]
let measLine     = null; // THREE.Line
let adjustIdx    = -1;   // which point is being moved (-1 = none)
let unit         = 'm';
let lastTapTime  = 0;
let reticleOnSurface = false; // true = snapped to ARCore plane, false = camera-forward fallback

let camStream    = null; // MediaStream for snapshot background
let camVideo     = null; // HTMLVideoElement

const _pos = new THREE.Vector3();

// ─────────────────────────────────────────────────────────────────────────────
// Init Three.js
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  scene  = new THREE.Scene();
  scene.background = null;

  camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 20);

  // alpha:true  → canvas pixels are transparent so XR compositor can show camera
  // preserveDrawingBuffer → pixels stay readable after frame ends (needed for snapshot)
  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0); // clear to fully transparent
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xffffff, 0x888888, 1));

  buildReticle();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  document.getElementById('ar-btn').addEventListener('click', startAR);
}

// ─────────────────────────────────────────────────────────────────────────────
// Reticle — fully opaque, always on top
// ─────────────────────────────────────────────────────────────────────────────
function buildReticle() {
  reticle = new THREE.Group();

  const mkMat = (color) => new THREE.MeshBasicMaterial({
    color, side: THREE.DoubleSide,
    depthTest: false, depthWrite: false,
    transparent: false   // opaque — transparent materials vanish against XR alpha layer
  });

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.06, 0.075, 32).rotateX(-Math.PI / 2), mkMat(0x007AFF));
  ring.renderOrder = 999;

  const dot = new THREE.Mesh(
    new THREE.CircleGeometry(0.015, 32).rotateX(-Math.PI / 2), mkMat(0xffffff));
  dot.renderOrder = 999;

  const lm = new THREE.LineBasicMaterial({ color: 0x007AFF, depthTest: false });
  const hL = new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(-0.09,0,0), new THREE.Vector3(0.09,0,0)]), lm);
  const vL = new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0,0,-0.09), new THREE.Vector3(0,0,0.09)]), lm);
  hL.renderOrder = 999; vL.renderOrder = 999;

  reticle.add(ring, dot, hL, vL);
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);
}

// ─────────────────────────────────────────────────────────────────────────────
// AR Session start
// ─────────────────────────────────────────────────────────────────────────────
async function startAR() {
  const btn = document.getElementById('ar-btn');
  btn.disabled = true;
  btn.textContent = 'Starting…';

  if (xrSession) {
    await xrSession.end().catch(() => {});
    xrSession = null;
    await new Promise(r => setTimeout(r, 300));
  }

  if (!navigator.xr) { toast('WebXR not supported. Use Chrome on Android.'); resetBtn(); return; }
  if (!await navigator.xr.isSessionSupported('immersive-ar').catch(() => false)) {
    toast('Immersive AR not supported on this device.'); resetBtn(); return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local'],
      optionalFeatures: ['hit-test', 'local-floor', 'dom-overlay'],
      domOverlay: { root: document.body }
    });

    xrSession = session;

    // ── BLACK SCREEN FIX ─────────────────────────────────────────────────────
    // Three.js r128 setSession() creates its own XRWebGLLayer internally.
    // On some devices it ignores the renderer's alpha flag and creates an opaque
    // layer — blocking the camera passthrough entirely (black screen).
    // Fix: make the GL context XR-compatible, create an alpha-enabled layer
    // ourselves, and set it on the session BEFORE calling setSession().
    // Three.js r128 checks renderState.baseLayer first; if already set it skips
    // creating its own, so our alpha layer is preserved.
    const gl = renderer.getContext();
    await gl.makeXRCompatible();
    session.updateRenderState({
      baseLayer: new XRWebGLLayer(session, gl, { alpha: true, antialias: true })
    });

    await renderer.xr.setSession(session);

    // Cache reference space — getReferenceSpace() can return null early frames
    xrRefSpace = renderer.xr.getReferenceSpace()
      || await session.requestReferenceSpace('local')
           .catch(() => session.requestReferenceSpace('local-floor'));

    // Start camera stream AFTER session is live so XR doesn't kill it
    startCamStream();

    // Show UI
    btn.style.display = 'none';
    document.getElementById('snap-btn').style.display = 'flex';
    document.getElementById('overlay').style.display = 'block';
    setStatus('Requesting surface detection…');

    // Delay tap-layer by 600 ms so the "Start Measuring" touchend
    // doesn't immediately fire a placement
    setTimeout(() => {
      const tl = document.getElementById('tap-layer');
      tl.style.display = 'block';
      tl.addEventListener('touchend', onTap, { passive: true });
    }, 600);

    session.addEventListener('select', onSelect); // fallback for non-dom-overlay
    session.addEventListener('end', onSessionEnd);
    renderer.setAnimationLoop(renderLoop);

  } catch (e) {
    toast('AR failed: ' + e.message);
    console.error(e);
    resetBtn();
  }
}

function onSessionEnd() {
  xrSession = null; xrRefSpace = null;
  hitTestSource = null; hitTestReady = false;
  adjustIdx = -1; lastTapTime = 0;
  renderer.setAnimationLoop(null);
  stopCamStream();

  const tl = document.getElementById('tap-layer');
  tl.style.display = 'none';
  tl.removeEventListener('touchend', onTap);

  document.getElementById('overlay').style.display = 'none';
  document.getElementById('snap-btn').style.display = 'none';
  clearPoints();
  resetBtn();
}

function resetBtn() {
  const btn = document.getElementById('ar-btn');
  btn.disabled = false;
  btn.textContent = 'Start Measuring';
  btn.style.display = 'block';
}

// ─────────────────────────────────────────────────────────────────────────────
// Tap handling
// ─────────────────────────────────────────────────────────────────────────────
function onTap()    { placeOrConfirm(); }
function onSelect() { placeOrConfirm(); } // XR fallback

function placeOrConfirm() {
  // Adjust-confirm: always immediate, no debounce
  if (adjustIdx >= 0) {
    if (navigator.vibrate) navigator.vibrate(20);
    confirmAdjust();
    return;
  }

  // Placement debounce: ignore taps within 800 ms
  const now = Date.now();
  if (now - lastTapTime < 800) return;
  lastTapTime = now;

  if (points.length >= 2) return;

  // Reticle is always visible now (surface-snapped or camera-forward fallback)
  // Give a hint if not snapped to a real surface
  if (!reticleOnSurface) {
    setStatus('No surface detected — point placed in free space. Adjust if needed.');
  }

  if (navigator.vibrate) navigator.vibrate(30);

  _pos.setFromMatrixPosition(reticle.matrix);
  const color = points.length === 0 ? 0x34c759 : 0xff3b30;
  const grp   = makePoint(color);
  grp.position.copy(_pos);
  scene.add(grp);
  points.push(grp);
  updateUI();
}

// ─────────────────────────────────────────────────────────────────────────────
// Point marker — opaque MeshBasicMaterial, always rendered on top
// ─────────────────────────────────────────────────────────────────────────────
function makePoint(color) {
  const grp = new THREE.Group();

  // White backing disc so marker is visible on any background
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(0.055, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({
      color: 0xffffff, side: THREE.DoubleSide,
      depthTest: false, depthWrite: false, transparent: false
    })
  );
  disc.renderOrder = 998;
  grp.add(disc);

  // Coloured sphere
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 24, 24),
    new THREE.MeshBasicMaterial({
      color, depthTest: false, depthWrite: false, transparent: false
    })
  );
  sphere.renderOrder = 999;
  grp.add(sphere);

  return grp;
}

// ─────────────────────────────────────────────────────────────────────────────
// Adjust mode
// ─────────────────────────────────────────────────────────────────────────────
window.startAdjust = (idx) => {
  if (points.length < 2) return;
  adjustIdx   = idx;
  lastTapTime = 0;

  // Dim the OTHER point only; selected point stays full brightness
  dimGroup(points[1 - idx], true);

  setStatus((idx === 0 ? 'Moving P1' : 'Moving P2') + ' — aim reticle & tap to confirm');

  // Show Confirm, hide the two Adjust buttons
  document.getElementById('adj-confirm').style.display = 'block';
  document.getElementById('adj-p1').style.display = 'none';
  document.getElementById('adj-p2').style.display = 'none';
};

window.confirmAdjust = () => {
  // Restore dimmed point
  dimGroup(points[1 - adjustIdx], false);
  adjustIdx = -1;

  // Hide Confirm, show the two Adjust buttons
  document.getElementById('adj-confirm').style.display = 'none';
  document.getElementById('adj-p1').style.display = 'block';
  document.getElementById('adj-p2').style.display = 'block';

  updateUI();
};

// dim = true → darken to 25%; dim = false → restore full brightness
function dimGroup(grp, dim) {
  grp.traverse(c => {
    if (!c.isMesh) return;
    if (dim) {
      c.material.color.multiplyScalar(0.25);
    } else {
      // restore by clamping back to 1 (works because original colors are saturated)
      const col = c.material.color;
      col.r = Math.min(col.r * 4, 1);
      col.g = Math.min(col.g * 4, 1);
      col.b = Math.min(col.b * 4, 1);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Reset
// ─────────────────────────────────────────────────────────────────────────────
window.resetAll = () => {
  clearPoints();
  updateUI();
};

function clearPoints() {
  points.forEach(g => scene.remove(g));
  points = [];
  if (measLine) { scene.remove(measLine); measLine = null; }
  adjustIdx   = -1;
  lastTapTime = 0;
  document.getElementById('adj-confirm').style.display = 'none';
  document.getElementById('adj-p1').style.display = 'block';
  document.getElementById('adj-p2').style.display = 'block';
  document.getElementById('adj-row').style.display = 'none';
}

// ─────────────────────────────────────────────────────────────────────────────
// Unit toggle
// ─────────────────────────────────────────────────────────────────────────────
window.setUnit = (u) => {
  unit = u;
  document.getElementById('u-m').className  = u === 'm'  ? 'blue' : '';
  document.getElementById('u-cm').className = u === 'cm' ? 'blue' : '';
  updateUI();
};

// ─────────────────────────────────────────────────────────────────────────────
// UI update — called after any placement/reset/unit change
// ─────────────────────────────────────────────────────────────────────────────
function updateUI() {
  if (points.length === 0) {
    setStatus('Point at surface & tap to place P1');
    document.getElementById('measure-text').innerText = '—';
    document.getElementById('adj-row').style.display = 'none';
  } else if (points.length === 1) {
    setStatus('Tap to place P2');
    document.getElementById('measure-text').innerText = '—';
    document.getElementById('adj-row').style.display = 'none';
  } else {
    updateLine();
    const dist = points[0].position.distanceTo(points[1].position);
    const val  = unit === 'm' ? dist : dist * 100;
    document.getElementById('measure-text').innerText = `${val.toFixed(2)} ${unit}`;
    setStatus('Tap Adjust P1/P2 to reposition');
    document.getElementById('adj-row').style.display = 'flex';
  }
}

function setStatus(msg) {
  document.getElementById('status').innerText = msg;
}

function updateLine() {
  if (measLine) scene.remove(measLine);
  if (points.length < 2) { measLine = null; return; }
  measLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([points[0].position, points[1].position]),
    new THREE.LineBasicMaterial({ color: 0xffffff, depthTest: false })
  );
  measLine.renderOrder = 997;
  scene.add(measLine);
}

function updateDistance() {
  if (points.length < 2) return;
  const dist = points[0].position.distanceTo(points[1].position);
  const val  = unit === 'm' ? dist : dist * 100;
  document.getElementById('measure-text').innerText = `${val.toFixed(2)} ${unit}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────────────────────────────────────
function renderLoop(_, frame) {
  if (frame) {
    const refSpace   = xrRefSpace || renderer.xr.getReferenceSpace();
    const session    = renderer.xr.getSession();

    // Request hit-test source once
    if (!hitTestReady && session) {
      hitTestReady = true;
      session.requestReferenceSpace('viewer')
        .then(vs => session.requestHitTestSource({ space: vs }))
        .then(src => {
          hitTestSource = src;
          setStatus('Point at surface & tap to place P1');
        })
        .catch(() => setStatus('Surface detection unavailable — tap anywhere to place'));
    }

    // Get the viewer (camera) pose for fallback reticle positioning
    const viewerPose = refSpace ? frame.getViewerPose(refSpace) : null;

    let hitFound = false;
    if (hitTestSource && refSpace) {
      const hits = frame.getHitTestResults(hitTestSource);
      if (hits.length > 0) {
        const pose = hits[0].getPose(refSpace);
        if (pose) {
          hitFound = true;
          reticleOnSurface = true;
          reticle.matrix.fromArray(pose.transform.matrix);

          // Live-move the point being adjusted
          if (adjustIdx >= 0 && points[adjustIdx]) {
            points[adjustIdx].position.setFromMatrixPosition(reticle.matrix);
            updateLine();
            updateDistance();
          }
        }
      }
    }

    if (!hitFound && viewerPose) {
      // ── Fallback reticle ─────────────────────────────────────────────────
      // No surface detected yet. Show reticle 1 m in front of camera so the
      // user always has a visible target and can tap to place points.
      // Extract camera position and forward direction from the viewer matrix.
      const vm = viewerPose.transform.matrix; // column-major Float32Array
      // Camera world position
      const cx = vm[12], cy = vm[13], cz = vm[14];
      // Camera forward in world space = negative local Z column
      const fx = -vm[8], fy = -vm[9], fz = -vm[10];
      const dist = 1.0; // 1 m ahead
      // Build a simple translation matrix for the reticle
      const m = new THREE.Matrix4();
      m.makeTranslation(cx + fx * dist, cy + fy * dist, cz + fz * dist);
      reticle.matrix.copy(m);
      reticleOnSurface = false;
    }

    // Reticle is always visible once we have a viewer pose
    reticle.visible = !!(viewerPose || hitFound);
  }
  renderer.render(scene, camera);
}

// ─────────────────────────────────────────────────────────────────────────────
// Camera stream for snapshot background
// ─────────────────────────────────────────────────────────────────────────────
async function startCamStream() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    camVideo = document.createElement('video');
    camVideo.srcObject  = camStream;
    camVideo.playsInline = true;
    camVideo.muted      = true;
    camVideo.play().catch(() => {});
  } catch (e) {
    console.warn('Camera stream unavailable for snapshot:', e.message);
  }
}

function stopCamStream() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo = null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Snapshot
// ─────────────────────────────────────────────────────────────────────────────
window.takeSnapshot = () => {
  // Flash
  const flash = document.getElementById('flash');
  flash.style.transition = 'none';
  flash.style.opacity    = '1';
  requestAnimationFrame(() => {
    flash.style.transition = 'opacity 0.45s ease';
    flash.style.opacity    = '0';
  });

  const glCanvas = renderer.domElement;
  const out = document.createElement('canvas');
  out.width  = glCanvas.width;
  out.height = glCanvas.height;
  const ctx = out.getContext('2d');

  // Layer 1 — camera background
  if (camVideo && camVideo.readyState >= 2 && camVideo.videoWidth > 0) {
    const vw = camVideo.videoWidth, vh = camVideo.videoHeight;
    const s  = Math.max(out.width / vw, out.height / vh);
    ctx.drawImage(camVideo, (out.width - vw*s)/2, (out.height - vh*s)/2, vw*s, vh*s);
  } else {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, out.width, out.height);
  }

  // Layer 2 — WebGL overlay (alpha:true so only 3D objects visible)
  ctx.drawImage(glCanvas, 0, 0);

  // Layer 3 — measurement label
  if (points.length === 2) {
    const dist  = points[0].position.distanceTo(points[1].position);
    const val   = unit === 'm' ? dist : dist * 100;
    const label = `${val.toFixed(2)} ${unit}`;
    const fs    = Math.round(out.width * 0.055);
    ctx.font         = `800 ${fs}px -apple-system, Helvetica, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    const tx = out.width / 2, ty = Math.round(out.height * 0.1);
    const tw = ctx.measureText(label).width, pad = fs * 0.55;
    const rx = tx - tw/2 - pad, ry = ty - fs*0.75;
    const rw = tw + pad*2,      rh = fs*1.5, r = rh/2;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath();
    ctx.moveTo(rx+r, ry); ctx.lineTo(rx+rw-r, ry);
    ctx.arcTo(rx+rw, ry, rx+rw, ry+r, r);
    ctx.lineTo(rx+rw, ry+rh-r);
    ctx.arcTo(rx+rw, ry+rh, rx+rw-r, ry+rh, r);
    ctx.lineTo(rx+r, ry+rh);
    ctx.arcTo(rx, ry+rh, rx, ry+rh-r, r);
    ctx.lineTo(rx, ry+r);
    ctx.arcTo(rx, ry, rx+r, ry, r);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#007AFF';
    ctx.fillText(label, tx, ty);
  }

  const a = document.createElement('a');
  a.download = `ar-measure-${Date.now()}.png`;
  a.href     = out.toDataURL('image/png');
  a.click();
};

// ─────────────────────────────────────────────────────────────────────────────
// Toast helper
// ─────────────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent   = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

init();
</script>
</body>
</html>
