<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Ruler - Draggable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background-color: transparent; }
        #overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0, 0, 0, 0.8); color: white;
            padding: 15px; border-radius: 20px; text-align: center; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .controls { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        button {
            background: #222; color: white; border: none; padding: 10px 15px;
            border-radius: 8px; font-weight: 600; font-size: 14px;
        }
        button.active { background: #007AFF; }
        #measure-text { font-size: 28px; font-weight: 800; color: #007AFF; margin: 5px 0; }
        #status { font-size: 12px; color: #888; margin-bottom: 5px; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
            transform: translate(-50%, -50%); pointer-events: none; display: none;
        }
        #crosshair::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
        }
        .line-v, .line-h { position: absolute; background: rgba(255,255,255,0.4); }
        .line-h { top: 50%; left: 0; width: 100%; height: 1px; }
        .line-v { left: 50%; top: 0; width: 1px; height: 100%; }

        #ar-btn-wrap { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); }
        #ar-btn { padding: 18px 40px; background: #007AFF; color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="crosshair"><div class="line-h"></div><div class="line-v"></div></div>
    <div id="overlay" style="display:none">
        <div id="status">Point at floor to start</div>
        <div id="measure-text">0.00 m</div>
        <div class="controls">
            <button id="u-m" class="active" onclick="setUnit('m')">m</button>
            <button id="u-cm" onclick="setUnit('cm')">cm</button>
            <button id="u-reset" style="background:#ff3b30" onclick="reset()">Reset</button>
        </div>
    </div>
    <div id="ar-btn-wrap"><button id="ar-btn">Start Measuring</button></div>

    <script type="module">
        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let unit = 'm';
        let draggingPoint = null;
        const raycaster = new THREE.Raycaster();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            // WebGLRenderer setup with explicit transparency
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                preserveDrawingBuffer: true
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            
            // Set clear alpha to 0 for transparency
            renderer.setClearColor(0x000000, 0); 
            
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            const reticleGeo = new THREE.RingGeometry(0.03, 0.04, 32).rotateX(-Math.PI/2);
            reticle = new THREE.Mesh(reticleGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            document.getElementById('ar-btn').addEventListener('click', startAR);
        }

        async function startAR() {
            // Check for WebXR support first
            if (!navigator.xr) {
                alert("WebXR is not supported on this browser/device.");
                return;
            }

            try {
                // We request 'immersive-ar' specifically. 
                // Using 'optionalFeatures' for dom-overlay ensures the session starts 
                // even if the overlay UI causes issues on specific hardware.
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: document.body }
                });

                // Ensure the renderer is ready for the XR session
                await renderer.xr.setSession(session);
                
                document.getElementById('ar-btn-wrap').style.display = 'none';
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('crosshair').style.display = 'block';

                session.addEventListener('selectstart', onTouchStart);
                session.addEventListener('selectend', onTouchEnd);
                
                // Clear background again inside session to be safe
                renderer.setClearColor(0x000000, 0);
                
                renderer.setAnimationLoop(render);
            } catch (e) {
                console.error("Failed to start AR session:", e);
                alert("AR Error: " + e.message);
            }
        }

        function onTouchStart(event) {
            const controller = event.inputSource;
            if (points.length > 0) {
                const tempMatrix = new THREE.Matrix4();
                tempMatrix.fromArray(controller.targetRaySpace.matrix);
                
                raycaster.ray.origin.setFromMatrixPosition(tempMatrix);
                raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix).normalize();

                const intersects = raycaster.intersectObjects(points);
                if (intersects.length > 0) {
                    draggingPoint = intersects[0].object;
                    document.getElementById('status').innerText = "Dragging Point...";
                    return;
                }
            }

            if (reticle.visible) {
                if (points.length >= 2) reset();
                
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 16, 16),
                    new THREE.MeshBasicMaterial({ color: points.length === 0 ? 0x34c759 : 0xff3b30 })
                );
                reticle.matrix.decompose(sphere.position, sphere.quaternion, sphere.scale);
                scene.add(sphere);
                points.push(sphere);
                updateMeasure();
                document.getElementById('status').innerText = points.length === 1 ? "Set second point" : "Drag points to adjust";
            }
        }

        function onTouchEnd() {
            draggingPoint = null;
            if (points.length === 2) document.getElementById('status').innerText = "Drag points to adjust";
        }

        window.reset = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) { scene.remove(line); line = null; }
            updateMeasure();
            document.getElementById('status').innerText = "Point at floor to start";
        };

        window.setUnit = (u) => {
            unit = u;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById(`u-${u}`).classList.add('active');
            updateMeasure();
        };

        function updateMeasure() {
            if (points.length < 2) {
                document.getElementById('measure-text').innerText = `0.00 ${unit}`;
                if (line) { scene.remove(line); line = null; }
                return;
            }
            const d = points[0].position.distanceTo(points[1].position);
            const val = unit === 'm' ? d : d * 100;
            document.getElementById('measure-text').innerText = `${val.toFixed(2)} ${unit}`;

            if (line) scene.remove(line);
            const geo = new THREE.BufferGeometry().setFromPoints([points[0].position, points[1].position]);
            line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x007AFF, linewidth: 2 }));
            scene.add(line);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested && session) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(referenceSpace);
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);

                        if (draggingPoint) {
                            draggingPoint.position.setFromMatrixPosition(reticle.matrix);
                            updateMeasure();
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
