<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Ruler - Draggable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background-color: transparent; }
        #overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 20px; text-align: center; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .controls { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        button {
            background: #222; color: white; border: none; padding: 10px 15px;
            border-radius: 8px; font-weight: 600; font-size: 14px;
            transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        button.active { background: #007AFF; }
        #measure-text { font-size: 32px; font-weight: 800; color: #007AFF; margin: 5px 0; }
        #status { font-size: 13px; color: #ccc; margin-bottom: 5px; font-weight: 500; }
        #tracking-warning { color: #ffcc00; font-weight: bold; display: none; margin-top: 5px; font-size: 11px; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; display: none;
        }
        #crosshair::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .line-v, .line-h { position: absolute; background: rgba(255,255,255,0.6); }
        .line-h { top: 50%; left: 0; width: 100%; height: 1.5px; }
        .line-v { left: 50%; top: 0; width: 1.5px; height: 100%; }

        #ar-btn-wrap { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); }
        #ar-btn { padding: 18px 45px; background: #007AFF; color: white; border: none; border-radius: 35px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Snapshot flash effect */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="crosshair"><div class="line-h"></div><div class="line-v"></div></div>
    <div id="overlay" style="display:none">
        <div id="status">Scan floor to find surface...</div>
        <div id="measure-text">0.00 m</div>
        <div id="tracking-warning">Low tracking quality. Move phone slowly.</div>
        <div class="controls">
            <button id="u-m" class="active" onclick="setUnit('m')">m</button>
            <button id="u-cm" onclick="setUnit('cm')">cm</button>
            <button id="u-snap" style="background:#34c759" onclick="takeSnapshot()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
            <button id="u-reset" style="background:#ff3b30" onclick="reset()">Reset</button>
        </div>
    </div>
    <div id="ar-btn-wrap"><button id="ar-btn">Start Measuring</button></div>

    <script type="module">
        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let ghostLine = null;
        let unit = 'm';
        let draggingPoint = null;
        const raycaster = new THREE.Raycaster();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                preserveDrawingBuffer: true // Required for taking snapshots
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearColor(0x000000, 0); 
            
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.5);
            scene.add(light);

            const reticleGeo = new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI/2);
            reticle = new THREE.Mesh(reticleGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            document.getElementById('ar-btn').addEventListener('click', startAR);
        }

        async function startAR() {
            if (!navigator.xr) {
                alert("WebXR is not supported on this browser/device.");
                return;
            }

            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay', 'local-floor'],
                    domOverlay: { root: document.body }
                });

                await renderer.xr.setSession(session);
                
                document.getElementById('ar-btn-wrap').style.display = 'none';
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('crosshair').style.display = 'block';

                session.addEventListener('selectstart', onTouchStart);
                session.addEventListener('selectend', onTouchEnd);
                
                renderer.setClearColor(0x000000, 0);
                renderer.setAnimationLoop(render);
            } catch (e) {
                console.error("Failed to start AR session:", e);
                alert("AR Error: " + e.message);
            }
        }

        window.takeSnapshot = () => {
            // Flash effect
            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 100);

            // Hide UI briefly for a clean shot
            const overlay = document.getElementById('overlay');
            const crosshair = document.getElementById('crosshair');
            overlay.style.opacity = '0';
            crosshair.style.opacity = '0';

            // Wait for next frame then capture
            requestAnimationFrame(() => {
                try {
                    const dataURL = renderer.domElement.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.download = `AR-Measurement-${new Date().getTime()}.png`;
                    link.href = dataURL;
                    link.click();
                } catch (e) {
                    console.error("Snapshot failed", e);
                } finally {
                    overlay.style.opacity = '1';
                    crosshair.style.opacity = '1';
                }
            });
        };

        function onTouchStart(event) {
            const controller = event.inputSource;
            
            if (points.length === 2) {
                const tempMatrix = new THREE.Matrix4();
                tempMatrix.fromArray(controller.targetRaySpace.matrix);
                raycaster.ray.origin.setFromMatrixPosition(tempMatrix);
                raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix).normalize();

                const intersects = raycaster.intersectObjects(points);
                if (intersects.length > 0) {
                    draggingPoint = intersects[0].object;
                    document.getElementById('status').innerText = "Moving Point...";
                    return;
                }
            }

            if (reticle.visible && points.length < 2) {
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.025, 16, 16),
                    new THREE.MeshBasicMaterial({ color: points.length === 0 ? 0x34c759 : 0xff3b30 })
                );
                reticle.matrix.decompose(sphere.position, sphere.quaternion, sphere.scale);
                scene.add(sphere);
                points.push(sphere);
                updateMeasure();

                if (points.length === 1) {
                    document.getElementById('status').innerText = "Set end point";
                } else {
                    document.getElementById('status').innerText = "Measurement complete. Drag points to adjust.";
                    if (ghostLine) { scene.remove(ghostLine); ghostLine = null; }
                }
            }
        }

        function onTouchEnd() {
            draggingPoint = null;
            if (points.length === 2) {
                document.getElementById('status').innerText = "Drag points to adjust";
            }
        }

        window.reset = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) { scene.remove(line); line = null; }
            if (ghostLine) { scene.remove(ghostLine); ghostLine = null; }
            updateMeasure();
            document.getElementById('status').innerText = "Scan floor to find surface...";
        };

        window.setUnit = (u) => {
            unit = u;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById(`u-${u}`).classList.add('active');
            updateMeasure();
        };

        function updateMeasure() {
            if (points.length < 2) {
                document.getElementById('measure-text').innerText = `0.00 ${unit}`;
                if (line) { scene.remove(line); line = null; }
                return;
            }
            const d = points[0].position.distanceTo(points[1].position);
            const val = unit === 'm' ? d : d * 100;
            document.getElementById('measure-text').innerText = `${val.toFixed(2)} ${unit}`;

            if (line) scene.remove(line);
            const geo = new THREE.BufferGeometry().setFromPoints([points[0].position, points[1].position]);
            line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x007AFF, linewidth: 3 }));
            scene.add(line);
        }

        function updateGhostLine() {
            if (points.length !== 1 || !reticle.visible) {
                if (ghostLine) { scene.remove(ghostLine); ghostLine = null; }
                return;
            }

            const currentPos = new THREE.Vector3();
            reticle.matrix.decompose(currentPos, new THREE.Quaternion(), new THREE.Vector3());
            
            const startPos = points[0].position;
            const d = startPos.distanceTo(currentPos);
            const val = unit === 'm' ? d : d * 100;
            document.getElementById('measure-text').innerText = `${val.toFixed(2)} ${unit}`;

            if (ghostLine) scene.remove(ghostLine);
            const geo = new THREE.BufferGeometry().setFromPoints([startPos, currentPos]);
            ghostLine = new THREE.Line(geo, new THREE.LineDashedMaterial({ 
                color: 0xaaaaaa, 
                dashSize: 0.01, 
                gapSize: 0.01 
            }));
            ghostLine.computeLineDistances();
            scene.add(ghostLine);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Check tracking quality
                const viewerPose = frame.getViewerPose(referenceSpace);
                const warningEl = document.getElementById('tracking-warning');
                if (viewerPose && viewerPose.emulatedPosition) {
                    warningEl.style.display = 'block';
                } else {
                    warningEl.style.display = 'none';
                }

                if (!hitTestSourceRequested && session) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(referenceSpace);
                        if (pose) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(pose.transform.matrix);
                            
                            const s = 1 + Math.sin(timestamp / 150) * 0.1;
                            reticle.scale.set(s, s, s);

                            if (draggingPoint) {
                                draggingPoint.position.setFromMatrixPosition(reticle.matrix);
                                updateMeasure();
                            } else {
                                updateGhostLine();
                            }
                            
                            if (points.length === 0) {
                                document.getElementById('status').innerText = "Surface found! Tap to start.";
                            }
                        }
                    } else {
                        reticle.visible = false;
                        if (points.length === 0) {
                            document.getElementById('status').innerText = "Scanning floor...";
                        }
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
