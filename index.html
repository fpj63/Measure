<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Precision Ruler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { color-scheme: only light; }

        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: none !important;
            background-color: transparent !important;
        }
        
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            background: none !important;
            background-color: transparent !important;
        }

        #overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.8); color: white;
            padding: 20px; border-radius: 30px; text-align: center; z-index: 2147483647;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto; display: none;
            font-family: sans-serif;
        }

        #measure-text { font-size: 42px; font-weight: 900; color: #007AFF; margin: 5px 0; }
        #status { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        button {
            flex: 1; background: #222; color: white; border: none; padding: 12px;
            border-radius: 12px; font-weight: bold; font-size: 13px;
        }
        button.active { background: #007AFF; }
        
        #ar-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; background: #007AFF; color: white; border: none;
            border-radius: 40px; font-size: 18px; font-weight: bold; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="status">Scanning Environment...</div>
        <div id="measure-text">0.00 m</div>
        <div class="btn-row">
            <button id="u-m" class="active" onclick="setUnit('m')">METERS</button>
            <button id="u-cm" onclick="setUnit('cm')">CM</button>
            <button style="background:#ff3b30" onclick="reset()">RESET</button>
        </div>
    </div>
    <button id="ar-btn">Enter AR</button>

    <script type="module">
        let camera, scene, renderer, reticle, gl;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let unit = 'm';
        let draggingPoint = null;
        const workingVec = new THREE.Vector3();

        // 1. Initialize core Three.js components
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ 
                alpha: true, 
                antialias: true,
                preserveDrawingBuffer: true 
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            
            // Critical for background transparency
            renderer.setClearColor(0x000000, 0);
            
            gl = renderer.getContext();
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
            
            // Reticle
            const ringGeom = new THREE.RingGeometry(0.035, 0.045, 32).rotateX(-Math.PI/2);
            reticle = new THREE.Mesh(ringGeom, new THREE.MeshBasicMaterial({ color: 0x007AFF }));
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            document.getElementById('ar-btn').addEventListener('click', startAR);
        }

        async function startAR() {
            if (!navigator.xr) return alert("WebXR not found");

            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: document.body }
                });

                renderer.xr.setSession(session);
                
                // Force the background to be transparent via the session's base layer
                session.updateRenderState({
                    baseLayer: new XRWebGLLayer(session, gl, { alpha: true })
                });

                document.getElementById('ar-btn').style.display = 'none';
                document.getElementById('overlay').style.display = 'block';

                session.addEventListener('selectstart', () => onSelect(true));
                session.addEventListener('selectend', () => onSelect(false));

                // Use the XR-specific animation loop
                renderer.setAnimationLoop(onAnimationFrame);
            } catch (err) {
                console.error(err);
                alert("Could not start AR: " + err.message);
            }
        }

        function onSelect(isStart) {
            if (isStart) {
                // Try to drag existing point
                if (points.length > 0) {
                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                    const intersects = raycaster.intersectObjects(points);
                    if (intersects.length > 0) {
                        draggingPoint = intersects[0].object;
                        return;
                    }
                }

                // Add new point
                if (reticle.visible && points.length < 2) {
                    const dot = new THREE.Mesh(
                        new THREE.SphereGeometry(0.015, 16, 16),
                        new THREE.MeshBasicMaterial({ color: points.length === 0 ? 0x34c759 : 0xff3b30 })
                    );
                    reticle.matrix.decompose(dot.position, dot.quaternion, workingVec);
                    scene.add(dot);
                    points.push(dot);
                    updateMeasure();
                }
            } else {
                draggingPoint = null;
            }
        }

        function updateMeasure() {
            if (points.length < 2) {
                document.getElementById('status').innerText = points.length === 1 ? "Aim and place second point" : "Scanning Environment...";
                return;
            }
            
            const dist = points[0].position.distanceTo(points[1].position);
            const displayVal = unit === 'm' ? dist : dist * 100;
            document.getElementById('measure-text').innerText = `${displayVal.toFixed(2)} ${unit}`;
            document.getElementById('status').innerText = "Ruler Active";

            if (line) scene.remove(line);
            const geom = new THREE.BufferGeometry().setFromPoints([points[0].position, points[1].position]);
            line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x007AFF, linewidth: 5 }));
            scene.add(line);
        }

        function onAnimationFrame(timestamp, frame) {
            if (frame) {
                const session = frame.session;
                const referenceSpace = renderer.xr.getReferenceSpace();
                
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length > 0) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(referenceSpace);
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);

                        if (draggingPoint) {
                            reticle.matrix.decompose(draggingPoint.position, workingVec, workingVec);
                            updateMeasure();
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            
            // Manual clear for safety
            renderer.autoClear = false;
            renderer.clear();
            renderer.render(scene, camera);
        }

        window.reset = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) scene.remove(line);
            line = null;
            document.getElementById('measure-text').innerText = `0.00 ${unit}`;
            updateMeasure();
        };

        window.setUnit = (u) => {
            unit = u;
            document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
            document.getElementById(`u-${u}`).classList.add('active');
            updateMeasure();
        };

        init();
    </script>
</body>
</html>
