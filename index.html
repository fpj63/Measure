<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Measuring Tape</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
        }
        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            background: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button.active { background: #007AFF; }
        #btn-save { background: #34c759; font-weight: bold; }
        #measure-text { font-size: 24px; font-weight: bold; margin: 5px 0; }
        #instructions { font-size: 12px; color: #ccc; }
        #ar-button-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        #ar-button {
            padding: 15px 30px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="overlay" style="display: none;">
        <div id="measure-text">0.00 m</div>
        <div class="controls">
            <button id="btn-mm" onclick="setUnit('mm')">mm</button>
            <button id="btn-cm" onclick="setUnit('cm')">cm</button>
            <button id="btn-m" class="active" onclick="setUnit('m')">m</button>
            <button id="btn-save" onclick="savePhoto()">Save Photo</button>
            <button style="background: #ff3b30;" onclick="clearPoints()">Reset</button>
        </div>
        <div id="instructions">Point at a surface and tap to place points</div>
    </div>

    <div id="ar-button-container">
        <button id="ar-button">Start Measurement</button>
    </div>

    <script type="module">
        let container;
        let camera, scene, renderer;
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let currentUnit = 'm';
        let lastDistanceText = "0.00 m";

        const measureText = document.getElementById('measure-text');
        const overlay = document.getElementById('overlay');
        const arButton = document.getElementById('ar-button');

        window.setUnit = (unit) => {
            currentUnit = unit;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById(`btn-${unit}`);
            if (btn) btn.classList.add('active');
            updateDistance();
        };

        window.clearPoints = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) {
                scene.remove(line);
                line = null;
            }
            updateDistance();
        };

        window.savePhoto = () => {
            renderer.render(scene, camera);
            
            const canvas = renderer.domElement;
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            ctx.drawImage(canvas, 0, 0);

            const boxW = 200;
            const boxH = 60;
            const padding = 20;
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(padding, padding, boxW, boxH, 10);
            } else {
                ctx.rect(padding, padding, boxW, boxH);
            }
            ctx.fill();

            ctx.fillStyle = "white";
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(lastDistanceText, padding + (boxW/2), padding + 40);

            const dataURL = tempCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `measurement-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        };

        init();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                preserveDrawingBuffer: true 
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            arButton.addEventListener('click', async () => {
                if (!navigator.xr) {
                    alert("WebXR not available. Use a compatible browser like Chrome on Android.");
                    return;
                }

                // Configuration strategy:
                // Many devices fail if 'dom-overlay' is a REQUIRED feature but the browser isn't ready.
                // We move 'hit-test' to optional and handle the lack of it gracefully, 
                // and ensure we request a simple session if the complex one fails.
                
                const sessionOptions = {
                    requiredFeatures: ['local'],
                    optionalFeatures: ['hit-test', 'dom-overlay'],
                    domOverlay: { root: document.body }
                };

                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionOptions);
                    onSessionStarted(session);
                } catch (err) {
                    console.error("Primary AR Session Error:", err);
                    
                    // Fallback: try without DOM overlay if that was the blocker
                    try {
                        const fallbackSession = await navigator.xr.requestSession('immersive-ar', {
                            optionalFeatures: ['hit-test']
                        });
                        onSessionStarted(fallbackSession);
                    } catch (err2) {
                        console.error("Fallback AR Session Error:", err2);
                        alert("Could not start AR: " + err2.message);
                    }
                }
            });

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
        }

        function onSessionStarted(session) {
            arButton.style.display = 'none';
            overlay.style.display = 'block';

            session.addEventListener('end', () => {
                hitTestSourceRequested = false;
                hitTestSource = null;
                overlay.style.display = 'none';
                arButton.style.display = 'block';
            });

            session.addEventListener('select', onSelect);
            renderer.xr.setReferenceSpaceType('local');
            renderer.xr.setSession(session);
            
            animate();
        }

        function onSelect() {
            if (reticle.visible) {
                if (points.length >= 2) {
                    clearPoints();
                }

                const geometry = new THREE.SphereGeometry(0.015, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: 0x007AFF });
                const sphere = new THREE.Mesh(geometry, material);
                
                reticle.matrix.decompose(sphere.position, sphere.quaternion, sphere.scale);
                scene.add(sphere);
                points.push(sphere);

                updateDistance();
            }
        }

        function updateDistance() {
            if (points.length < 2) {
                lastDistanceText = `0.00 ${currentUnit}`;
                measureText.innerText = lastDistanceText;
                if (line) {
                    scene.remove(line);
                    line = null;
                }
                return;
            }

            const p1 = points[0].position;
            const p2 = points[1].position;
            const distance = p1.distanceTo(p2);

            if (line) scene.remove(line);
            const lineGeometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
            line = new THREE.Line(lineGeometry, lineMaterial);
            scene.add(line);

            let displayVal = distance;
            if (currentUnit === 'cm') displayVal = distance * 100;
            if (currentUnit === 'mm') displayVal = distance * 1000;

            lastDistanceText = `${displayVal.toFixed(2)} ${currentUnit}`;
            measureText.innerText = lastDistanceText;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        // Check if hit testing is available on this session
                        if (session.requestHitTestSource) {
                            session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                                hitTestSource = source;
                            });
                        }
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);
                        if (pose) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(pose.transform.matrix);
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
