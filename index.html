<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Measuring Tape</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        button {
            background: #333;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.95); }
        button.active { background: #007AFF; box-shadow: 0 0 15px rgba(0,122,255,0.4); }
        #btn-save { background: #34c759; }
        #measure-text { font-size: 32px; font-weight: 800; margin: 5px 0; color: #007AFF; text-shadow: 0 0 10px rgba(0,122,255,0.3); }
        #instructions { font-size: 13px; color: #aaa; margin-top: 8px; letter-spacing: 0.3px; }
        
        /* Persistent Crosshair HUD */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        /* Center Dot */
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        /* Cross lines */
        .hair-v, .hair-h {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
        }
        .hair-h { top: 50%; left: 0; width: 100%; height: 1.5px; transform: translateY(-50%); }
        .hair-v { left: 50%; top: 0; width: 1.5px; height: 100%; transform: translateX(-50%); }

        #ar-button-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        #ar-button {
            padding: 20px 45px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="crosshair">
        <div class="hair-h"></div>
        <div class="hair-v"></div>
    </div>

    <div id="overlay" style="display: none;">
        <div id="measure-text">0.00 m</div>
        <div class="controls">
            <button id="btn-mm" onclick="setUnit('mm')">mm</button>
            <button id="btn-cm" onclick="setUnit('cm')">cm</button>
            <button id="btn-m" class="active" onclick="setUnit('m')">m</button>
            <button id="btn-save" onclick="savePhoto()">Save</button>
            <button style="background: #ff3b30;" onclick="clearPoints()">Reset</button>
        </div>
        <div id="instructions">Center the crosshair & tap screen</div>
    </div>

    <div id="ar-button-container">
        <button id="ar-button">Start Ruler</button>
    </div>

    <script type="module">
        let container, camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let currentUnit = 'm';
        let lastDistanceText = "0.00 m";

        const measureText = document.getElementById('measure-text');
        const overlay = document.getElementById('overlay');
        const arButton = document.getElementById('ar-button');
        const crosshair = document.getElementById('crosshair');

        window.setUnit = (unit) => {
            currentUnit = unit;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${unit}`).classList.add('active');
            updateDistance();
        };

        window.clearPoints = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) { scene.remove(line); line = null; }
            updateDistance();
        };

        window.savePhoto = () => {
            renderer.render(scene, camera);
            const canvas = renderer.domElement;
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            ctx.drawImage(canvas, 0, 0);

            const boxW = 240, boxH = 70, padding = 20;
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            if (ctx.roundRect) {
                ctx.beginPath(); ctx.roundRect(padding, padding, boxW, boxH, 12); ctx.fill();
            } else {
                ctx.fillRect(padding, padding, boxW, boxH);
            }
            ctx.fillStyle = "#007AFF";
            ctx.font = "bold 32px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(lastDistanceText, padding + (boxW/2), padding + 47);

            const link = document.createElement('a');
            link.download = `ar-measure-${Date.now()}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        };

        init();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.5);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            arButton.addEventListener('click', async () => {
                const options = { requiredFeatures: ['local'], optionalFeatures: ['hit-test', 'dom-overlay'], domOverlay: { root: document.body } };
                const session = await navigator.xr.requestSession('immersive-ar', options);
                onSessionStarted(session);
            });

            // Improved Pulse-ready Reticle
            const reticleGeo = new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2);
            const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            reticle = new THREE.Mesh(reticleGeo, reticleMat);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
        }

        function onSessionStarted(session) {
            arButton.style.display = 'none';
            overlay.style.display = 'block';
            crosshair.style.display = 'block';

            session.addEventListener('end', () => {
                overlay.style.display = 'none';
                arButton.style.display = 'block';
                crosshair.style.display = 'none';
                hitTestSourceRequested = false;
                hitTestSource = null;
            });

            // CRITICAL FIX: Use 'selectstart' for instant tap response instead of 'select'
            session.addEventListener('selectstart', onSelect);
            
            renderer.xr.setReferenceSpaceType('local');
            renderer.xr.setSession(session);
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (reticle.visible) {
                // Limit to 2 points for a single measurement line
                if (points.length >= 2) clearPoints();

                const isStart = points.length === 0;
                const pointColor = isStart ? 0x34c759 : 0xff3b30; // Start Green, End Red
                
                const geometry = new THREE.SphereGeometry(0.015, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: pointColor });
                const sphere = new THREE.Mesh(geometry, material);
                
                reticle.matrix.decompose(sphere.position, sphere.quaternion, sphere.scale);
                scene.add(sphere);
                points.push(sphere);

                updateDistance();
            }
        }

        function updateDistance() {
            if (points.length < 2) {
                lastDistanceText = `0.00 ${currentUnit}`;
                measureText.innerText = lastDistanceText;
                if (line) { scene.remove(line); line = null; }
                return;
            }

            const p1 = points[0].position;
            const p2 = points[1].position;
            const distance = p1.distanceTo(p2);

            if (line) scene.remove(line);
            
            // Draw a high-visibility line
            const lineGeometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x007AFF });
            line = new THREE.Line(lineGeometry, lineMaterial);
            scene.add(line);

            let displayVal = distance;
            if (currentUnit === 'cm') displayVal = distance * 100;
            if (currentUnit === 'mm') displayVal = distance * 1000;

            lastDistanceText = `${displayVal.toFixed(2)} ${currentUnit}`;
            measureText.innerText = lastDistanceText;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            // Pulse effect for the reticle
            if (reticle.visible) {
                const s = 1 + Math.sin(timestamp / 150) * 0.15;
                reticle.scale.set(s, s, s);
            }

            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        session.requestHitTestSource({ space: refSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);
                        if (pose) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(pose.transform.matrix);
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
