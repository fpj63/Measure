<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Precision Ruler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: -apple-system, system-ui, sans-serif;
            background: #000; touch-action: none;
        }
        canvas {
            display: block; width: 100vw !important; height: 100vh !important;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* ── Top overlay ── */
        #overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 360px;
            background: rgba(0,0,0,0.82); color: white;
            padding: 18px 18px 14px; border-radius: 24px; text-align: center;
            z-index: 10; backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            display: none; pointer-events: auto;
        }
        #status {
            font-size: 11px; color: #aaa;
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
        }
        #measure-text { font-size: 38px; font-weight: 800; color: #007AFF; margin: 2px 0 10px; }

        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        button {
            flex: 1; background: #2a2a2a; color: white; border: none;
            padding: 11px 6px; border-radius: 12px; font-weight: 600;
            font-size: 12px; cursor: pointer; transition: background 0.15s;
        }
        button:active { opacity: 0.7; }
        button:disabled { opacity: 0.35; pointer-events: none; }
        button.active  { background: #007AFF; }
        button.danger  { background: #ff3b30; }
        button.warning { background: #ff9500; }
        button.confirm { background: #34c759; }

        /* Adjust row — hidden until 2 points placed */
        #adjust-row { display: none; margin-top: 8px; }

        /* ── Bottom bar ── */
        #bottom-bar {
            position: absolute; bottom: 44px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 16px; align-items: center; z-index: 100;
        }
        #ar-btn {
            padding: 18px 40px; background: #007AFF; color: white; border: none;
            border-radius: 35px; font-size: 17px; font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,122,255,0.4); cursor: pointer;
        }
        /* Shutter button */
        #snap-btn {
            width: 64px; height: 64px; border-radius: 50%;
            background: white; border: 5px solid rgba(255,255,255,0.6);
            display: none; align-items: center; justify-content: center;
            font-size: 26px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            cursor: pointer; flex-shrink: 0;
        }
        #snap-btn:active { transform: scale(0.92); }

        /* Error toast */
        #error-msg {
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(255,59,48,0.92); color: white; padding: 12px 20px;
            border-radius: 12px; font-size: 13px; z-index: 200;
            display: none; max-width: 300px; text-align: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
        }

        /* Camera-shutter flash */
        #flash {
            position: fixed; inset: 0; background: white;
            opacity: 0; pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="status">Scanning for surfaces…</div>
        <div id="measure-text">—</div>

        <!-- Unit + reset row -->
        <div class="btn-row">
            <button id="u-m"  class="active" onclick="setUnit('m')">METERS</button>
            <button id="u-cm"               onclick="setUnit('cm')">CM</button>
            <button class="danger"          onclick="resetPoints()">RESET</button>
        </div>

        <!-- Adjust row — appears after both points placed -->
        <div class="btn-row" id="adjust-row">
            <button id="adj-p1" class="warning" onclick="startAdjust(0)">Adjust P1</button>
            <button id="adj-p2" class="warning" onclick="startAdjust(1)">Adjust P2</button>
            <button id="adj-confirm" class="confirm" style="display:none" onclick="confirmAdjust()">✓ Confirm</button>
        </div>
    </div>

    <div id="bottom-bar">
        <button id="ar-btn">Start Measuring</button>
        <button id="snap-btn" onclick="takeSnapshot()">📸</button>
    </div>

    <div id="error-msg"></div>
    <div id="flash"></div>

    <script type="module">
        // ─── State ────────────────────────────────────────────────────────────
        let camera, scene, renderer, reticle;
        let hitTestSource        = null;
        let hitTestSourceRequested = false;
        let xrReferenceSpace     = null;
        let activeSession        = null;
        let sessionStarting      = false;

        let pointMeshes  = [];   // THREE.Mesh for each placed point
        let line         = null; // measurement line
        let unit         = 'm';

        // -1 = not adjusting; 0 or 1 = index of point being repositioned
        let adjustTarget = -1;

        // Concurrent camera stream for snapshot background compositing
        // Started AFTER setSession() — Chrome Android allows getUserMedia alongside WebXR
        let cameraVideo  = null;
        let cameraStream = null;

        const _q = new THREE.Quaternion();
        const _s = new THREE.Vector3();

        // ─── Bootstrap ────────────────────────────────────────────────────────
        function init() {
            scene = new THREE.Scene();
            scene.background = null;

            camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({
                alpha: true,                   // transparent canvas — AR passthrough shows through
                antialias: true,
                preserveDrawingBuffer: true,   // lets us read WebGL pixels for snapshot overlay
                powerPreference: 'high-performance'
            });
            renderer.setPixelRatio(devicePixelRatio);
            renderer.setSize(innerWidth, innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearColor(0x000000, 0); // fully transparent clear
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
            const dir = new THREE.DirectionalLight(0xffffff, 0.6);
            dir.position.set(1, 2, 1);
            scene.add(dir);

            buildReticle();

            addEventListener('resize', () => {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });

            document.getElementById('ar-btn').addEventListener('click', onStartAR);
        }

        // ─── Reticle ──────────────────────────────────────────────────────────
        function buildReticle() {
            reticle = new THREE.Group();

            reticle.add(new THREE.Mesh(
                new THREE.RingGeometry(0.06, 0.075, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x007AFF, side: THREE.DoubleSide })
            ));
            reticle.add(new THREE.Mesh(
                new THREE.CircleGeometry(0.015, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
            ));

            const cm = new THREE.LineBasicMaterial({ color: 0x007AFF });
            reticle.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-0.08, 0, 0), new THREE.Vector3(0.08, 0, 0)
            ]), cm));
            reticle.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, -0.08), new THREE.Vector3(0, 0, 0.08)
            ]), cm));

            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);
        }

        // ─── AR Session ───────────────────────────────────────────────────────
        async function onStartAR() {
            if (sessionStarting) return;
            sessionStarting = true;

            const btn = document.getElementById('ar-btn');
            btn.disabled = true;
            btn.textContent = 'Starting…';

            if (activeSession) {
                await activeSession.end().catch(() => {});
                activeSession = null;
                await new Promise(r => setTimeout(r, 300));
            }

            if (!navigator.xr) { showError('WebXR not available. Use Chrome 81+ on Android.'); resetBtn(); return; }
            const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
            if (!ok) { showError('Immersive AR not supported on this device.'); resetBtn(); return; }

            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local'],
                    optionalFeatures: ['hit-test', 'local-floor', 'dom-overlay'],
                    domOverlay: { root: document.body }
                });

                activeSession = session;
                await renderer.xr.setSession(session);

                // ↓ Start camera stream AFTER setSession — this is the critical timing.
                //   On Chrome Android, WebXR does not exclusively lock the camera;
                //   getUserMedia can run concurrently once the XR session is live.
                startCameraStream();

                xrReferenceSpace = renderer.xr.getReferenceSpace()
                    || await session.requestReferenceSpace('local').catch(
                        () => session.requestReferenceSpace('local-floor'));

                btn.style.display = 'none';
                document.getElementById('snap-btn').style.display = 'flex';
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('status').innerText = 'Requesting surface detection…';

                session.addEventListener('select', onSelect);
                session.addEventListener('end', onSessionEnd);
                renderer.setAnimationLoop(render);

            } catch (e) {
                showError('AR failed to start: ' + e.message);
                console.error(e);
                resetBtn();
            } finally {
                sessionStarting = false;
            }
        }

        function onSessionEnd() {
            activeSession = null;
            xrReferenceSpace = null;
            hitTestSource = null;
            hitTestSourceRequested = false;
            adjustTarget = -1;
            renderer.setAnimationLoop(null);
            stopCameraStream();
            resetPoints();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('snap-btn').style.display = 'none';
            resetBtn();
        }

        // ─── Tap handler ──────────────────────────────────────────────────────
        function onSelect() {
            if (!reticle.visible) return;
            if (navigator.vibrate) navigator.vibrate(30);

            if (adjustTarget >= 0) {
                // Confirm new position for the point being adjusted
                confirmAdjust();
                return;
            }

            if (pointMeshes.length >= 2) return;

            const isFirst = pointMeshes.length === 0;
            const color   = isFirst ? 0x34c759 : 0xff3b30;

            // Group: sphere + flat ring halo — MeshBasicMaterial so lighting doesn't matter
            const group = new THREE.Group();

            group.add(new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 20, 20),
                new THREE.MeshBasicMaterial({ color })
            ));

            // White outline sphere slightly larger — makes it pop against any background
            group.add(new THREE.Mesh(
                new THREE.SphereGeometry(0.034, 20, 20),
                new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, opacity: 0.6, transparent: true })
            ));

            // Flat ring on the surface plane — visible when looking straight down
            group.add(new THREE.Mesh(
                new THREE.RingGeometry(0.045, 0.058, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, opacity: 0.85, transparent: true })
            ));

            reticle.matrix.decompose(group.position, _q, _s);
            scene.add(group);
            pointMeshes.push(group);
            updateUI();
        }

        // ─── Adjust mode ──────────────────────────────────────────────────────
        window.startAdjust = (idx) => {
            if (pointMeshes.length < 2) return;
            adjustTarget = idx;

            // Pulse opacity: selected point full brightness, other dimmed
            pointMeshes[idx].traverse(c => { if (c.isMesh) c.material.opacity = 1; });
            pointMeshes[1 - idx].traverse(c => { if (c.isMesh) { c.material.transparent = true; c.material.opacity = 0.25; } });

            const label = idx === 0 ? 'Moving P1' : 'Moving P2';
            document.getElementById('status').innerText = label + ' — aim & tap to confirm';

            // Show confirm button, hide adjust buttons
            document.getElementById('adj-p1').style.display = 'none';
            document.getElementById('adj-p2').style.display = 'none';
            document.getElementById('adj-confirm').style.display = '';
        };

        window.confirmAdjust = () => {
            adjustTarget = -1;
            // Restore full opacity on both points
            pointMeshes.forEach(g => g.traverse(c => { if (c.isMesh) c.material.opacity = c.material.wireframe ? 0.6 : (c.geometry.type === 'RingGeometry' ? 0.85 : 1); }));
            document.getElementById('adj-p1').style.display = '';
            document.getElementById('adj-p2').style.display = '';
            document.getElementById('adj-confirm').style.display = 'none';
            updateUI();
        };

        // ─── Reset / unit ─────────────────────────────────────────────────────
        window.resetPoints = () => {
            pointMeshes.forEach(m => scene.remove(m));
            pointMeshes = [];
            adjustTarget = -1;
            if (line) { scene.remove(line); line = null; }
            document.getElementById('adjust-row').style.display = 'none';
            document.getElementById('adj-confirm').style.display = 'none';
            document.getElementById('adj-p1').style.display = '';
            document.getElementById('adj-p2').style.display = '';
            updateUI();
        };

        window.setUnit = (u) => {
            unit = u;
            document.getElementById('u-m').classList.toggle('active', u === 'm');
            document.getElementById('u-cm').classList.toggle('active', u === 'cm');
            updateUI();
        };

        // ─── UI update ────────────────────────────────────────────────────────
        function updateUI() {
            const status  = document.getElementById('status');
            const distEl  = document.getElementById('measure-text');
            const adjRow  = document.getElementById('adjust-row');

            if (pointMeshes.length === 0) {
                status.innerText = 'Point at surface & tap';
                distEl.innerText = '—';
                adjRow.style.display = 'none';
            } else if (pointMeshes.length === 1) {
                status.innerText = 'Place second point';
                distEl.innerText = '—';
                adjRow.style.display = 'none';
            } else {
                refreshLine();
                const dist = pointMeshes[0].position.distanceTo(pointMeshes[1].position);
                const val  = unit === 'm' ? dist : dist * 100;
                distEl.innerText = `${val.toFixed(2)} ${unit}`;
                status.innerText = 'Tap Adjust to reposition a point';
                adjRow.style.display = 'flex';
                pointMeshes.forEach(m => m.material.emissiveIntensity = 0.5);
            }
        }

        function refreshLine() {
            if (line) scene.remove(line);
            if (pointMeshes.length < 2) { line = null; return; }
            // pointMeshes are Groups — position is on the group itself
            const p0 = pointMeshes[0].position;
            const p1 = pointMeshes[1].position;
            const mat = new THREE.LineBasicMaterial({ color: 0xffffff });
            const geo = new THREE.BufferGeometry().setFromPoints([p0, p1]);
            line = new THREE.Line(geo, mat);
            scene.add(line);
        }

        // Live distance readout during adjust
        function refreshDistance() {
            if (pointMeshes.length < 2) return;
            const dist = pointMeshes[0].position.distanceTo(pointMeshes[1].position);
            const val  = unit === 'm' ? dist : dist * 100;
            document.getElementById('measure-text').innerText = `${val.toFixed(2)} ${unit}`;
        }

        // ─── Camera stream (concurrent with WebXR for snapshot) ───────────────
        async function startCameraStream() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                cameraVideo = document.createElement('video');
                cameraVideo.srcObject = cameraStream;
                cameraVideo.playsInline = true;
                cameraVideo.muted = true;
                cameraVideo.play().catch(() => {});
            } catch (e) {
                console.warn('Concurrent camera stream unavailable:', e.message);
                // Snapshot will still work, just without the real-world background
            }
        }

        function stopCameraStream() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            cameraVideo = null;
        }

        // ─── Snapshot ─────────────────────────────────────────────────────────
        window.takeSnapshot = async () => {
            // Flash effect
            const flash = document.getElementById('flash');
            flash.style.transition = 'none';
            flash.style.opacity = '1';
            requestAnimationFrame(() => {
                flash.style.transition = 'opacity 0.5s ease';
                flash.style.opacity = '0';
            });

            const glCanvas = renderer.domElement;
            const out = document.createElement('canvas');
            out.width  = glCanvas.width;
            out.height = glCanvas.height;
            const ctx  = out.getContext('2d');

            // Layer 1 — real-world background from concurrent camera stream
            if (cameraVideo && cameraVideo.readyState >= 2 && cameraVideo.videoWidth > 0) {
                // Cover-fit: fill the canvas without letterboxing
                const vw = cameraVideo.videoWidth;
                const vh = cameraVideo.videoHeight;
                const scale = Math.max(out.width / vw, out.height / vh);
                const dw = vw * scale, dh = vh * scale;
                ctx.drawImage(cameraVideo,
                    (out.width - dw) / 2, (out.height - dh) / 2, dw, dh);
            } else {
                // Fallback: dark gradient so the label is still legible
                const grad = ctx.createLinearGradient(0, 0, 0, out.height);
                grad.addColorStop(0, '#1c1c1e');
                grad.addColorStop(1, '#2c2c2e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, out.width, out.height);
            }

            // Layer 2 — WebGL canvas (alpha:true → only 3-D objects, transparent bg)
            ctx.drawImage(glCanvas, 0, 0);

            // Layer 3 — measurement label pill burnt into image
            if (pointMeshes.length === 2) {
                const dist = pointMeshes[0].position.distanceTo(pointMeshes[1].position);
                const val  = unit === 'm' ? dist : dist * 100;
                const label = `${val.toFixed(2)} ${unit}`;

                const fontSize = Math.round(out.width * 0.055);
                ctx.font = `800 ${fontSize}px -apple-system, Helvetica, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const tx = out.width / 2;
                const ty = Math.round(out.height * 0.1);
                const tw = ctx.measureText(label).width;
                const pad = fontSize * 0.55;

                const rx = tx - tw / 2 - pad, ry = ty - fontSize * 0.75;
                const rw = tw + pad * 2,       rh = fontSize * 1.5;
                const r  = rh / 2;

                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.beginPath();
                ctx.moveTo(rx + r, ry);
                ctx.lineTo(rx + rw - r, ry);
                ctx.arcTo(rx + rw, ry, rx + rw, ry + r, r);
                ctx.lineTo(rx + rw, ry + rh - r);
                ctx.arcTo(rx + rw, ry + rh, rx + rw - r, ry + rh, r);
                ctx.lineTo(rx + r, ry + rh);
                ctx.arcTo(rx, ry + rh, rx, ry + rh - r, r);
                ctx.lineTo(rx, ry + r);
                ctx.arcTo(rx, ry, rx + r, ry, r);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#007AFF';
                ctx.fillText(label, tx, ty);
            }

            // Download
            const a = document.createElement('a');
            a.download = `ar-measure-${Date.now()}.png`;
            a.href = out.toDataURL('image/png');
            a.click();
        };

        // ─── Render loop ──────────────────────────────────────────────────────
        function render(timestamp, frame) {
            if (frame) {
                const refSpace = xrReferenceSpace || renderer.xr.getReferenceSpace();
                const session  = renderer.xr.getSession();

                if (!hitTestSourceRequested && session) {
                    hitTestSourceRequested = true;
                    session.requestReferenceSpace('viewer')
                        .then(vs => session.requestHitTestSource({ space: vs }))
                        .then(src => {
                            hitTestSource = src;
                            if (pointMeshes.length === 0)
                                document.getElementById('status').innerText = 'Point at a surface & tap';
                        })
                        .catch(err => {
                            console.warn('hit-test unavailable:', err);
                            document.getElementById('status').innerText = 'Surface detection unavailable';
                        });
                }

                if (hitTestSource && refSpace) {
                    const hits = frame.getHitTestResults(hitTestSource);
                    if (hits.length > 0) {
                        const pose = hits[0].getPose(refSpace);
                        if (pose) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(pose.transform.matrix);

                            // Live-move the selected point while adjusting
                            if (adjustTarget >= 0 && pointMeshes[adjustTarget]) {
                                reticle.matrix.decompose(
                                    pointMeshes[adjustTarget].position, _q, _s);
                                refreshLine();
                                refreshDistance();
                            }
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // ─── Helpers ──────────────────────────────────────────────────────────
        function resetBtn() {
            sessionStarting = false;
            const btn = document.getElementById('ar-btn');
            btn.disabled = false;
            btn.textContent = 'Start Measuring';
            btn.style.display = 'block';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 7000);
        }

        init();
    </script>
</body>
</html>
