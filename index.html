<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Measuring Tape</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            background: #444;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        button.active { background: #007AFF; box-shadow: 0 0 10px rgba(0,122,255,0.5); }
        #btn-save { background: #34c759; }
        #measure-text { font-size: 28px; font-weight: 800; margin: 5px 0; color: #007AFF; text-shadow: 0 0 10px rgba(0,122,255,0.3); }
        #instructions { font-size: 13px; color: #eee; margin-top: 8px; }
        
        /* Central Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 2px;
        }
        #crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }

        #ar-button-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        #ar-button {
            padding: 18px 40px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="overlay" style="display: none;">
        <div id="measure-text">0.00 m</div>
        <div class="controls">
            <button id="btn-mm" onclick="setUnit('mm')">mm</button>
            <button id="btn-cm" onclick="setUnit('cm')">cm</button>
            <button id="btn-m" class="active" onclick="setUnit('m')">m</button>
            <button id="btn-save" onclick="savePhoto()">Save Photo</button>
            <button style="background: #ff3b30;" onclick="clearPoints()">Reset</button>
        </div>
        <div id="instructions">Align crosshair and tap to set points</div>
    </div>

    <div id="ar-button-container">
        <button id="ar-button">Start AR Ruler</button>
    </div>

    <script type="module">
        let container;
        let camera, scene, renderer;
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let currentUnit = 'm';
        let lastDistanceText = "0.00 m";

        const measureText = document.getElementById('measure-text');
        const overlay = document.getElementById('overlay');
        const arButton = document.getElementById('ar-button');
        const crosshair = document.getElementById('crosshair');

        window.setUnit = (unit) => {
            currentUnit = unit;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById(`btn-${unit}`);
            if (btn) btn.classList.add('active');
            updateDistance();
        };

        window.clearPoints = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) {
                scene.remove(line);
                line = null;
            }
            updateDistance();
        };

        window.savePhoto = () => {
            renderer.render(scene, camera);
            const canvas = renderer.domElement;
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            ctx.drawImage(canvas, 0, 0);

            const boxW = 240;
            const boxH = 70;
            const padding = 20;
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            if (ctx.roundRect) {
                ctx.beginPath(); ctx.roundRect(padding, padding, boxW, boxH, 12); ctx.fill();
            } else {
                ctx.fillRect(padding, padding, boxW, boxH);
            }

            ctx.fillStyle = "#007AFF";
            ctx.font = "bold 30px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(lastDistanceText, padding + (boxW/2), padding + 45);

            const dataURL = tempCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `ar-measurement-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        };

        init();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            arButton.addEventListener('click', async () => {
                if (!navigator.xr) { alert("WebXR not supported."); return; }
                const options = { requiredFeatures: ['local'], optionalFeatures: ['hit-test', 'dom-overlay'], domOverlay: { root: document.body } };
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', options);
                    onSessionStarted(session);
                } catch (e) {
                    const fallback = await navigator.xr.requestSession('immersive-ar', { optionalFeatures: ['hit-test'] });
                    onSessionStarted(fallback);
                }
            });

            // Improved Pulsing Reticle
            const reticleGeo = new THREE.RingGeometry(0.03, 0.04, 32).rotateX(-Math.PI / 2);
            const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            reticle = new THREE.Mesh(reticleGeo, reticleMat);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
        }

        function onSessionStarted(session) {
            arButton.style.display = 'none';
            overlay.style.display = 'block';
            crosshair.style.display = 'block';

            session.addEventListener('end', () => {
                hitTestSourceRequested = false;
                hitTestSource = null;
                overlay.style.display = 'none';
                arButton.style.display = 'block';
                crosshair.style.display = 'none';
            });

            session.addEventListener('select', onSelect);
            renderer.xr.setReferenceSpaceType('local');
            renderer.xr.setSession(session);
            animate();
        }

        function onSelect() {
            if (reticle.visible) {
                if (points.length >= 2) clearPoints();

                // Distinct colors for Start (Green) and End (Red)
                const isStart = points.length === 0;
                const color = isStart ? 0x34c759 : 0xff3b30;
                
                const geometry = new THREE.SphereGeometry(0.02, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: color });
                const sphere = new THREE.Mesh(geometry, material);
                
                reticle.matrix.decompose(sphere.position, sphere.quaternion, sphere.scale);
                scene.add(sphere);
                points.push(sphere);

                updateDistance();
            }
        }

        function updateDistance() {
            if (points.length < 2) {
                lastDistanceText = `0.00 ${currentUnit}`;
                measureText.innerText = lastDistanceText;
                if (line) { scene.remove(line); line = null; }
                return;
            }

            const p1 = points[0].position;
            const p2 = points[1].position;
            const distance = p1.distanceTo(p2);

            if (line) scene.remove(line);
            // Thick dashed-look line using more vertices
            const lineGeometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x007AFF, linewidth: 5 });
            line = new THREE.Line(lineGeometry, lineMaterial);
            scene.add(line);

            let displayVal = distance;
            if (currentUnit === 'cm') displayVal = distance * 100;
            if (currentUnit === 'mm') displayVal = distance * 1000;

            lastDistanceText = `${displayVal.toFixed(2)} ${currentUnit}`;
            measureText.innerText = lastDistanceText;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            // Pulse the reticle
            if (reticle.visible) {
                const s = 1 + Math.sin(timestamp / 200) * 0.1;
                reticle.scale.set(s, s, s);
            }

            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        if (session.requestHitTestSource) {
                            session.requestHitTestSource({ space: refSpace }).then((source) => {
                                hitTestSource = source;
                            });
                        }
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);
                        if (pose) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(pose.transform.matrix);
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
