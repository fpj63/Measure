<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Precision Ruler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* CRITICAL: Force every possible container to be transparent */
        :root { color-scheme: light; }
        
        * {
            background-color: transparent !important;
        }

        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: -apple-system, system-ui, sans-serif; 
            background: none !important;
            touch-action: none; 
        }
        
        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            background: none !important;
        }

        /* The overlay is the ONLY thing allowed to have a background */
        #overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 350px; 
            background: rgba(0, 0, 0, 0.8) !important; /* Force override the * reset */
            color: white;
            padding: 20px; border-radius: 25px; text-align: center; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            display: none;
            pointer-events: auto;
        }

        #measure-text { font-size: 36px; font-weight: 800; color: #007AFF; margin: 5px 0; background: none !important; }
        #status { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; background: none !important; }
        
        .btn-row { display: flex; gap: 8px; margin-top: 15px; background: none !important; }
        
        button {
            flex: 1; background: #222 !important; color: white; border: none; padding: 12px;
            border-radius: 12px; font-weight: 600; font-size: 13px;
        }
        button.active { background: #007AFF !important; }
        
        #ar-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 18px 40px; background: #007AFF !important; color: white; border: none;
            border-radius: 35px; font-size: 17px; font-weight: 700; z-index: 100;
            box-shadow: 0 10px 25px rgba(0,122,255,0.4);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="status">Scanning for surfaces...</div>
        <div id="measure-text">0.00 m</div>
        <div class="btn-row">
            <button id="u-m" class="active" onclick="setUnit('m')">METERS</button>
            <button id="u-cm" onclick="setUnit('cm')">CM</button>
            <button style="background:#ff3b30 !important" onclick="resetPoints()">RESET</button>
        </div>
    </div>
    <button id="ar-btn">Start Measuring</button>

    <script type="module">
        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let line = null;
        let unit = 'm';
        const workingVec = new THREE.Vector3();
        const workingQuat = new THREE.Quaternion();

        function init() {
            scene = new THREE.Scene();
            // Ensure the scene itself has no background color
            scene.background = null;

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true, // Required for AR transparency
                preserveDrawingBuffer: true
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            
            // Set the clear color to fully transparent
            renderer.setClearColor(0x000000, 0); 
            
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Reticle: Visual guide for surface detection
            reticle = new THREE.Group();
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.035, 0.045, 32).rotateX(-Math.PI/2),
                new THREE.MeshBasicMaterial({ color: 0x007AFF })
            );
            const dot = new THREE.Mesh(
                new THREE.CircleGeometry(0.005, 32).rotateX(-Math.PI/2),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            reticle.add(ring, dot);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            document.getElementById('ar-btn').addEventListener('click', onStartAR);
        }

        async function onStartAR() {
            if (navigator.xr) {
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', {
                        requiredFeatures: ['hit-test'],
                        optionalFeatures: ['dom-overlay'],
                        domOverlay: { root: document.body }
                    });
                    
                    renderer.xr.setSession(session);
                    
                    // Force transparent clearing on the session layer
                    renderer.setClearAlpha(0);

                    document.getElementById('ar-btn').style.display = 'none';
                    document.getElementById('overlay').style.display = 'block';

                    session.addEventListener('select', onSelect);
                    renderer.setAnimationLoop(render);
                } catch (e) {
                    alert("AR Start Failed: " + e.message);
                }
            } else {
                alert("WebXR not found. Please use Chrome on Android.");
            }
        }

        function onSelect() {
            if (reticle.visible && points.length < 2) {
                if (window.navigator.vibrate) window.navigator.vibrate(30);

                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 16, 16),
                    new THREE.MeshStandardMaterial({ 
                        color: points.length === 0 ? 0x34c759 : 0xff3b30,
                        emissive: points.length === 0 ? 0x34c759 : 0xff3b30,
                        emissiveIntensity: 0.5
                    })
                );
                
                reticle.matrix.decompose(sphere.position, workingQuat, workingVec);
                scene.add(sphere);
                points.push(sphere);
                
                updateUI();
            }
        }

        window.resetPoints = () => {
            points.forEach(p => scene.remove(p));
            points = [];
            if (line) { scene.remove(line); line = null; }
            updateUI();
        };

        window.setUnit = (u) => {
            unit = u;
            document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
            document.getElementById(`u-${u}`).classList.add('active');
            updateUI();
        };

        function updateUI() {
            const status = document.getElementById('status');
            const distText = document.getElementById('measure-text');

            if (points.length === 0) {
                status.innerText = "Point at surface";
                distText.innerText = `0.00 ${unit}`;
            } else if (points.length === 1) {
                status.innerText = "Place second point";
            } else {
                status.innerText = "Measurement complete";
                const dist = points[0].position.distanceTo(points[1].position);
                const val = unit === 'm' ? dist : dist * 100;
                distText.innerText = `${val.toFixed(2)} ${unit}`;
                
                if (line) scene.remove(line);
                const geometry = new THREE.BufferGeometry().setFromPoints([points[0].position, points[1].position]);
                line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x007AFF, linewidth: 5 }));
                scene.add(line);
            }
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        session.requestHitTestSource({ space: refSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length > 0) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(referenceSpace);
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            
            // Ensure clear alpha is 0 every single frame
            renderer.setClearAlpha(0);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
